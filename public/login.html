<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediManage | Login</title>
    <meta name="description" content="Login to MediManage premium medical shop management system.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <!-- Background Animated Shapes -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Main Container -->
    <div class="login-container">
        <!-- Login Form Area -->
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-notes-medical login-icon"></i>
                <h1>Welcome Back</h1>
                <p>Sign in to MediManage to continue</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div id="loginError" class="error-msg">Invalid credentials. Please try again.</div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username (admin)" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password (admin)" required>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary login-btn">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                
                <div style="text-align: center; margin-top: 1.5rem; color: #a0aec0; font-size: 0.95rem;">
                    Don't have an account? <a href="register.html" style="color: #4CAF50; text-decoration: none; font-weight: 500;">Sign Up</a>
                </div>
            </form>
        </div>
        
        <!-- Illustration Area -->
        <div class="login-illustration">
            <div class="glass-content">
                <h2>Efficient. Secure. Intuitive.</h2>
                <p>Manage your medical shop inventory from anywhere with our premium dashboard and real-time analytics.</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
